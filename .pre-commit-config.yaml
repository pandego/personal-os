# Vendored skills under .agents/skills/ (except local ones) are excluded from
# style hooks so upstream code stays untouched.
exclude: |
  (?x)^(
    \.agents/skills/(brainstorming|docx|frontend-design|mcp-builder|pdf|pptx|skill-creator|using-git-worktrees|xlsx)/.*
  )$

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: \.secrets\.baseline$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
